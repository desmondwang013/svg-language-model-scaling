dataset:
  primary: starvector/svg-icons-simple
  supplementary:
    - starvector/svg-emoji-simple

cleaning:
  strip_comments: true
  strip_metadata: true
  collapse_whitespace: true
  round_coordinates_decimals: 1
  canonicalize_attribute_order: false

filtering:
  min_chars: 50
  max_tokens_estimate: 2048

splits:
  train: 0.98
  val: 0.01
  test: 0.01

validation:
  require_xml_parse: true
  require_svg_root: true
