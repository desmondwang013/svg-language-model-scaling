model:
  name: xl_best
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_ff: 3072
  context_length: 1024
  dropout: 0.1

optimizer:
  name: adamw
  learning_rate: 0.001
  weight_decay: 0.1
  betas: [0.9, 0.95]

training:
  batch_size_tokens: 2048
  warmup_steps: 20
  epochs: 1
  grad_clip_norm: 1.0
  seed: 42
  eval_steps: 20
  val_batches: 8
  max_steps: 60
