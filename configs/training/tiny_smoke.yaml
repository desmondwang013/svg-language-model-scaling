model:
  name: tiny_smoke
  d_model: 128
  n_layers: 2
  n_heads: 4
  d_ff: 256
  context_length: 128
  dropout: 0.1

optimizer:
  name: adamw
  learning_rate: 0.0003
  weight_decay: 0.1
  betas: [0.9, 0.95]

training:
  batch_size_tokens: 4096
  warmup_steps: 2
  epochs: 1
  grad_clip_norm: 1.0
  seed: 42
  eval_steps: 1
  val_batches: 2
  max_steps: 3
